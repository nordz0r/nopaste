name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ${{ format('{0}/{1}', secrets.DOCKERHUB_USERNAME, github.event.repository.name) }}

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      sha: ${{ steps.release.outputs.sha }}
      html_url: ${{ steps.release.outputs.html_url }}

    steps:
      - name: Check token source
        run: |
          if [ -n "${{ secrets.RELEASE_PLEASE_TOKEN }}" ]; then
            echo "Using RELEASE_PLEASE_TOKEN for release-please."
          else
            echo "::warning::RELEASE_PLEASE_TOKEN is not set. release-please will fall back to GITHUB_TOKEN and can fail to create PRs unless repository settings allow GitHub Actions to create and approve pull requests."
          fi

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-release-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
