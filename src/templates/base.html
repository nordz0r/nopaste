<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nopaste{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-backdrop"></div>
    <header class="site-header">
        <div class="header-container">
            <div class="header-brand">
                <a href="/" class="brand-lockup" aria-label="Nopaste home">
                    <span class="brand-badge">
                        <img src="/static/images/goldfinches_logo.png" alt="Goldfinch logo" class="brand-logo">
                    </span>
                    <span class="brand-copy">
                        <span class="brand-kicker">Private-looking text sharing</span>
                        <span class="brand-wordmark">Nopaste</span>
                    </span>
                </a>
                {% if paste_id %}
                <button id="copy-btn" class="secondary-button" title="Скопировать ссылку">Copy Link</button>
                {% endif %}
            </div>
            <div class="header-actions">
                <nav class="nav-links" aria-label="Primary">
                    <a href="/list" class="nav-link">My List</a>
                </nav>
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
    function showNotification(message) {
        const notification = document.getElementById("notification");
        if (!notification) {
            return;
        }
        notification.textContent = message;
        notification.style.display = "block";
        setTimeout(() => {
            notification.style.opacity = "0";
            setTimeout(() => {
                notification.style.display = "none";
                notification.style.opacity = "1";
            }, 500);
        }, 2000);
    }

    function copyPasteUrl() {
        const pasteUrl = window.location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(pasteUrl).then(() => {
                showNotification("Ссылка скопирована!");
            }).catch(() => {
                fallbackCopy(pasteUrl);
            });
        } else {
            fallbackCopy(pasteUrl);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        try {
            const successful = document.execCommand("copy");
            if (successful) {
                showNotification("Ссылка скопирована!");
            } else {
                showNotification("Не удалось скопировать ссылку");
            }
        } catch (err) {
            showNotification("Ошибка копирования: " + err);
        }
        document.body.removeChild(textarea);
    }

    const copyButton = document.getElementById("copy-btn");
    if (copyButton) {
        copyButton.addEventListener("click", function() {
            copyPasteUrl();
        });
    }
    </script>
</body>
</html>
