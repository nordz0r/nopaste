{% extends "base.html" %}

{% block title %}Create Nopaste{% endblock %}

{% block content %}
<h2></h2>
<div class="form-container">
    <form action="/paste" method="post" id="nopaste-form">
        <textarea name="content" rows="10" placeholder="Вставьте ваш текст здесь..."></textarea><br>
        <input type="submit" value="Сохранить">
    </form>
    <div id="notification" class="notification"></div>
</div>

<script>
// Функция для показа всплывающей подсказки
function showNotification(message) {
    const notification = document.getElementById("notification");
    notification.textContent = message;
    notification.style.display = "block";
    setTimeout(() => {
        notification.style.opacity = "0";
        setTimeout(() => {
            notification.style.display = "none";
            notification.style.opacity = "1"; // Сбрасываем для следующего раза
        }, 500); // Время затухания
    }, 2000); // Время отображения
}

// Обработчик отправки формы
document.getElementById("nopaste-form").addEventListener("submit", function(event) {
    const textarea = document.querySelector("textarea[name='content']");
    if (!textarea.value.trim()) {
        event.preventDefault(); // Предотвращаем отправку формы
        showNotification("Нельзя сохранить пустой nopaste!");
    }
});
</script>
{% endblock %}
