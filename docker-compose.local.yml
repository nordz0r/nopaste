---
services:
  nopaste-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nopaste:local
    container_name: nopaste-local
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_PATH: /data/pastes.db
    volumes:
      - nopaste_local_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  nopaste_local_data:
